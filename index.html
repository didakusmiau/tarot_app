<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcana Profunda · Tarot Profesional</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #0f0f1a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6530;
    --violet: #6b4fa0;
    --violet-light: #9b7fd4;
    --violet-dim: #2d1f4a;
    --text: #e8e0d0;
    --text-dim: #9a8f7e;
    --card-back: #12102a;
    --card-border: #c9a84c;
    --shadow: rgba(201,168,76,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 80%, rgba(155,127,212,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 60%, rgba(155,127,212,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 50%, rgba(155,127,212,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 90%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 45%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 65% 15%, rgba(255,255,255,0.12) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 75%, rgba(255,255,255,0.1) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    position: relative;
    z-index: 1;
  }
  .sigil {
    font-size: 2.5rem;
    line-height: 1;
    margin-bottom: 0.5rem;
    filter: drop-shadow(0 0 12px var(--gold));
  }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    color: var(--gold-light);
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 1rem;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.05em;
  }
  .divider {
    display: flex; align-items: center; gap: 1rem;
    max-width: 500px; margin: 1.5rem auto 0;
  }
  .divider span { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }
  .divider-icon { color: var(--gold); font-size: 1.1rem; }

  /* Main panel */
  main { position: relative; z-index: 1; padding: 1rem; max-width: 1100px; margin: 0 auto; }

  /* Setup panel */
  #setup-panel {
    background: linear-gradient(135deg, rgba(15,15,26,0.95), rgba(20,15,40,0.95));
    border: 1px solid var(--gold-dim);
    border-radius: 1.2rem;
    padding: 2rem;
    max-width: 700px;
    margin: 0 auto 2rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
  }
  .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  @media(max-width:540px){ .setup-grid { grid-template-columns: 1fr; } }

  .field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .field select, .field input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--gold-dim);
    border-radius: 0.5rem;
    color: var(--text);
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    appearance: none;
    cursor: pointer;
  }
  .field select:focus, .field input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(201,168,76,0.15);
  }
  .field select option { background: #1a1530; color: var(--text); }

  .tirada-desc {
    margin-top: 1.2rem;
    padding: 1rem;
    background: rgba(107,79,160,0.1);
    border: 1px solid rgba(107,79,160,0.3);
    border-radius: 0.6rem;
    font-size: 0.92rem;
    color: var(--text-dim);
    font-style: italic;
    min-height: 3.5rem;
    transition: opacity 0.3s;
  }

  .btn-consult {
    display: block;
    width: 100%;
    margin-top: 1.5rem;
    padding: 1rem 2rem;
    background: linear-gradient(135deg, #7a5c20, #c9a84c, #7a5c20);
    background-size: 200% 100%;
    border: none;
    border-radius: 0.6rem;
    color: #0a0a0f;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background-position 0.4s, box-shadow 0.3s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .btn-consult:hover {
    background-position: 100% 0;
    box-shadow: 0 6px 30px rgba(201,168,76,0.5);
    transform: translateY(-1px);
  }
  .btn-consult:active { transform: translateY(0); }

  /* Shuffle animation */
  #shuffle-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(5,5,15,0.92);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1.5rem;
  }
  #shuffle-overlay.active { display: flex; }
  .shuffle-cards {
    position: relative; width: 120px; height: 180px;
  }
  .shuffle-card {
    position: absolute;
    width: 70px; height: 110px;
    border-radius: 8px;
    background: linear-gradient(135deg, #1a1040, #2d1f4a);
    border: 2px solid var(--gold-dim);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: shuffleAnim 1.8s ease-in-out infinite;
  }
  .shuffle-card:nth-child(1){ left:0; top:20px; animation-delay:0s; }
  .shuffle-card:nth-child(2){ left:25px; top:10px; animation-delay:0.2s; }
  .shuffle-card:nth-child(3){ left:50px; top:0px; animation-delay:0.4s; }
  @keyframes shuffleAnim {
    0%,100%{ transform: rotate(-8deg) translateY(0); }
    50%{ transform: rotate(8deg) translateY(-15px); }
  }
  .shuffle-text {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    letter-spacing: 0.2em;
    font-size: 0.85rem;
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* Reading section */
  #reading-section { display: none; }
  #reading-section.active { display: block; }

  .reading-header {
    text-align: center;
    margin-bottom: 2rem;
    padding: 1.5rem;
    background: linear-gradient(135deg, rgba(15,15,26,0.9), rgba(20,15,40,0.9));
    border: 1px solid var(--gold-dim);
    border-radius: 1rem;
  }
  .reading-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    color: var(--gold-light);
    margin-bottom: 0.4rem;
  }
  .reading-meta {
    font-size: 0.9rem;
    color: var(--text-dim);
    font-style: italic;
  }

  /* Cards grid */
  .cards-stage {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .card-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    flex: 0 0 auto;
  }
  .slot-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--gold-dim);
    text-transform: uppercase;
    text-align: center;
    max-width: 130px;
  }

  .card-flip {
    width: 110px; height: 170px;
    perspective: 1000px;
    cursor: pointer;
  }
  @media(max-width:480px){
    .card-flip{ width: 90px; height: 140px; }
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4,0.2,0.2,1);
    border-radius: 10px;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    overflow: hidden;
  }
  .card-back {
    background: linear-gradient(135deg, #0d0a20, #1e1640);
    border: 2px solid var(--gold-dim);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 0 20px rgba(107,79,160,0.1);
  }
  .card-back::before {
    content: '✦';
    font-size: 2.5rem;
    color: var(--gold-dim);
    text-shadow: 0 0 10px rgba(201,168,76,0.3);
  }
  .card-back .tap-hint {
    position: absolute; bottom: 8px;
    font-size: 0.6rem; color: var(--gold-dim);
    font-family: 'Cinzel', serif; letter-spacing: 0.1em;
    text-transform: uppercase; opacity: 0.7;
  }
  .card-front {
    background: linear-gradient(160deg, #16103a, #0d0a20);
    border: 2px solid var(--gold);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 15px rgba(201,168,76,0.1);
    padding: 0.4rem;
    flex-direction: column;
    gap: 0.2rem;
    transform: rotateY(180deg);
  }
  .card-front.inverted-card .card-emoji { transform: rotate(180deg); }
  .card-emoji { font-size: 2.8rem; line-height: 1; transition: transform 0.3s; }
  @media(max-width:480px){ .card-emoji{ font-size: 2.2rem; } }
  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    text-align: center;
    text-transform: uppercase;
    padding: 0 0.2rem;
    line-height: 1.3;
  }
  .card-inv-badge {
    font-size: 0.5rem;
    color: var(--violet-light);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
  }

  /* Interpretation panels */
  .interp-panel {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    max-width: 750px;
    margin: 0 auto 1.5rem;
    background: linear-gradient(135deg, rgba(15,15,26,0.97), rgba(20,15,40,0.97));
    border: 1px solid var(--gold-dim);
    border-left: 3px solid var(--gold);
    border-radius: 0.8rem;
    padding: 1.5rem;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    display: none;
  }
  .interp-panel.visible {
    opacity: 1;
    transform: translateY(0);
    display: block;
  }
  .interp-pos {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .interp-card-title {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    color: var(--gold-light);
    margin-bottom: 0.8rem;
  }
  .interp-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 2rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.1em;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  .badge-derecha { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
  .badge-invertida { background: rgba(107,79,160,0.2); color: var(--violet-light); border: 1px solid var(--violet); }
  .interp-body { font-size: 1rem; line-height: 1.75; color: var(--text); }
  .interp-body p { margin-bottom: 0.8rem; }
  .interp-body p:last-child { margin-bottom: 0; }
  .interp-signo { color: var(--violet-light); font-style: italic; }
  .interp-momento { color: var(--gold-dim); font-style: italic; font-size: 0.92rem; }

  /* Bottom nav */
  .bottom-actions {
    text-align: center;
    padding: 2rem 1rem;
    display: none;
  }
  .bottom-actions.active { display: block; }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.7rem 2rem;
    border-radius: 2rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-reset:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); box-shadow: 0 0 15px rgba(201,168,76,0.2); }

  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 0.8rem;
    color: var(--gold-dim);
    font-style: italic;
    letter-spacing: 0.05em;
    position: relative; z-index: 1;
  }
</style>
</head>

  <div id="reading-section">

      <div class="reading-meta" id="reading-meta"></div>
    </div>
    <div class="cards-stage" id="cards-stage"></div>
    <div id="interps-container"></div>
  </div>

  <div class="bottom-actions" id="bottom-actions">
    <button class="btn-reset" onclick="resetApp()">↺ Nueva Consulta</button>
  </div>
</main>

<footer>Las cartas revelan posibilidades, no certezas · Arcana Profunda © 2025</footer>

  {id:16,nombre:'La Torre',emoji:'⚡',arcano:'Mayor',

   inv:'Invertida, la Torre señala el miedo a un cambio disruptivo necesario, una crisis que se prolonga por resistencia o la evitación de una verdad que, de todas formas, terminará saliendo.',
   signo:{aries:'La Torre derrumba obstáculos que impedían tu camino; el caos es tu terreno fértil.',tauro:'La Torre destruye la falsa seguridad; lo que queda es lo verdaderamente sólido.',geminis:'La Torre derrumba ideas obsoletas para que tu mente pueda abrazar nuevas verdades.',cancer:'La Torre sacude tu mundo emocional; lo que sobrevive es el amor verdadero.',leo:'La Torre derrumba el ego que no sirve; lo que queda es el verdadero oro de tu ser.',virgo:'La Torre destruye sistemas que ya no funcionan; la reconstrucción será más perfecta.',libra:'La Torre derrumba el equilibrio artificial; el nuevo equilibrio será más auténtico.',escorpio:'La Torre es tu terreno natural; sabes mejor que nadie cómo renacer de las ruinas.',sagitario:'La Torre destruye creencias limitantes disfrazadas de verdades filosóficas.',capricornio:'La Torre derrumba lo construido sobre arena; los cimientos verdaderos son los que importan.',acuario:'La Torre acelera la revolución que llevas dentro; el sistema viejo cae para que el nuevo llegue.',piscis:'La Torre disuelve ilusiones; la realidad que emerge es más auténtica y nutritiva.'},
   pos:{pasado:'Una crisis o ruptura repentina fue un punto de inflexión que no elegiste pero que necesitabas.',futuro:'El futuro puede traer una sacudida liberadora; prepárate para soltar lo que cae.',consejo:'No construyas sobre bases falsas; mejor una crisis ahora que un derrumbe mayor después.',corazon_asunto:'El núcleo es una disrupción necesaria que derrumba lo que no tenía bases sólidas.',resultado:'El resultado es la liberación a través del derrumbe; lo que queda en pie es lo real.',reto:'El desafío es no entrar en pánico ante el derrumbe y confiar en el proceso.',actitud:'Tu actitud ante el caos define si lo vives como catástrofe o como liberación.',yo:'Estás en medio o a punto de una sacudida que cambiará tu perspectiva.',entorno:'Tu entorno está experimentando cambios disruptivos que te afectan.',esperanza:'Deseas que la crisis termine; temes que las pérdidas sean permanentes.',potencial:'Tu potencial de reconstruir algo más sólido y auténtico es enorme tras el derrumbe.',base:'Los cimientos tenían grietas que ahora se hacen visibles; la reparación es posible.',vinculo:'El vínculo pasa por una crisis que revelará si los cimientos son sólidos o no.',pareja:'La otra persona también está atravesando una sacudida; la honestidad es urgente.',presente:'Estás en medio de la tormenta; recuerda que los rayos también iluminan.',base2:''},
   momento:{mañana:'El amanecer tras la tormenta siempre trae más claridad; confía en la renovación.',tarde:'Cuando el caos parezca máximo, busca el ojo del huracán: tu centro de calma.',noche:'La noche de la Torre es intensa; no tomes decisiones permanentes en el pico emocional.'}
  },
  {id:17,nombre:'La Estrella',emoji:'⭐',arcano:'Mayor',
   sig:'La Estrella representa la esperanza renovada después de la tormenta, la fe en el futuro y el flujo generoso de energía cósmica que nutre el alma y restaura la confianza en la vida.',
   inv:'Invertida, la Estrella señala pérdida de esperanza, desconexión espiritual o una fe que necesita ser renovada. También puede indicar dificultad para recibir el cuidado y el amor que el universo ofrece.',
   signo:{aries:'La Estrella renueva tu fe en el camino que has elegido; sigue avanzando.',tauro:'La Estrella confirma que la abundancia que siembras dará frutos bellos y duraderos.',geminis:'La Estrella te recuerda que hay verdades más profundas que la mente puede alcanzar.',cancer:'La Estrella restaura tu corazón sensible; eres amado por el universo.',leo:'La Estrella amplifica tu luz natural; comparte tu brillo sin miedo ni reservas.',virgo:'La Estrella te invita a confiar en el proceso aunque no puedas controlar cada detalle.',libra:'La Estrella trae la armonía que buscas; la belleza del universo está disponible para ti.',escorpio:'La Estrella es la esperanza que emerge después de tu transformación más profunda.',sagitario:'La Estrella confirma tu fe en el universo; el camino que exploras tiene sentido.',capricornio:'La Estrella te recuerda que hay recompensas más allá del trabajo duro: la gracia.',acuario:'La Estrella ilumina tu visión humanitaria; el futuro que sueñas es posible.',piscis:'La Estrella es tu casa; tu conexión con la gracia cósmica es uno de tus dones más preciosos.'},
   pos:{pasado:'Una experiencia de gracia, esperanza o renovación fue sanadora en tu historia.',futuro:'El futuro trae renovación, esperanza y una conexión más profunda con tu propósito.',consejo:'Confía en el universo; la ayuda que necesitas viene cuando te abres a recibirla.',corazon_asunto:'El núcleo es la esperanza, la renovación y la conexión con algo más grande que tú.',resultado:'El resultado es positivo y lleno de esperanza; la gracia está contigo.',reto:'El desafío es mantener la fe incluso cuando las circunstancias la ponen a prueba.',actitud:'Tu actitud es abierta y esperanzadora; ves el potencial en cada situación.',yo:'Eres un canal de luz y esperanza; permítete también recibirlas.',entorno:'Tu entorno se beneficia de tu capacidad de mantener la esperanza y la visión.',esperanza:'Deseas sentirte guiado y amado por algo más grande; confías en que llegará.',potencial:'Tu potencial de ser un faro de esperanza para otros y para ti mismo es ilimitado.',base:'Los cimientos incluyen experiencias de gracia y renovación que te han sostenido.',vinculo:'El vínculo tiene la bendición de las estrellas; hay un componente kármico positivo.',pareja:'La otra persona trae luz y renovación a tu vida; confía en esta conexión.',presente:'Estás bajo la influencia de la Estrella; la gracia y la esperanza son tus aliadas ahora.',base2:''},
   momento:{mañana:'El amanecer bajo las estrellas que se apagan es tu momento de renovar la esperanza.',tarde:'La luz del día refleja la Estrella interior; comparte tu brillo con generosidad.',noche:'La noche estrellada te conecta con el cosmos; medita bajo el cielo abierto.'}
  },
  {id:18,nombre:'La Luna',emoji:'🌛',arcano:'Mayor',
   sig:'La Luna representa el reino de los sueños, las ilusiones y el inconsciente profundo. Ilumina los miedos ancestrales, los engaños y los ciclos emocionales que operan desde las sombras.',
   inv:'Invertida, la Luna señala el inicio de la claridad tras la confusión, la superación de ilusiones o el fin de un período de engaño.',
   signo:{aries:'La Luna modera tu claridad habitual; acepta que no todo puede conocerse racionalmente.',tauro:'La Luna activa tu intuición más allá de los sentidos físicos; escucha lo que sientes.',geminis:'La Luna revela que hay más verdad en lo que no se dice que en lo que se expresa.',cancer:'La Luna es tu planeta regente; estás en tu elemento más profundo y poderoso.',leo:'La Luna te invita a explorar tu mundo interior con la misma valentía que el exterior.',virgo:'La Luna disuelve la ilusión de control; confía en el proceso aunque no lo veas claramente.',libra:'La Luna revela las dinámicas ocultas en tus relaciones; escucha más allá de las palabras.',escorpio:'La Luna ilumina tu sombra más profunda; este conocimiento es tu mayor poder.',sagitario:'La Luna te pide que explores el territorio interior con la misma aventura que el exterior.',capricornio:'La Luna disuelve certezas; acepta que el camino es a veces nocturno y misterioso.',acuario:'La Luna conecta tu mente con el inconsciente colectivo; presta atención a los patrones.',piscis:'La Luna es tu territorio sagrado; tus sueños y visiones tienen información valiosa.'},
   pos:{pasado:'Confusión, ilusión o el mundo de los sueños jugó un papel en tu pasado.',futuro:'El futuro pide que navegues con intuición en aguas oscuras e inciertas.',consejo:'No todo lo que ves es lo que es; confía en la intuición más que en las apariencias.',corazon_asunto:'El núcleo implica confusión, ilusión o dinámicas inconscientes que necesitan luz.',resultado:'El resultado emerge gradualmente desde la neblina; la paciencia es indispensable.',reto:'El desafío es distinguir entre el miedo irracional y la intuición real.',actitud:'Tu actitud está influenciada por miedos e ilusiones; examínalos con compasión.',yo:'Estás en contacto profundo con tu mundo inconsciente en este momento.',entorno:'Tu entorno no es completamente lo que aparenta; hay dinámicas ocultas operando.',esperanza:'Deseas claridad; temes que la confusión no termine.',potencial:'Tu potencial de acceder a sabiduría inconsciente e intuitiva es enorme.',base:'Los cimientos incluyen patrones emocionales inconscientes que ahora emergen.',vinculo:'El vínculo tiene una dimensión misteriosa y no completamente visible.',pareja:'La otra persona puede no estar mostrando todo lo que siente o piensa.',presente:'Estás en un período de neblina y misterio; navega con intuición.',base2:''},
   momento:{mañana:'Los sueños de la noche traen información valiosa; anótalos al despertar.',tarde:'Cuando algo no cuadre hoy, confía en tu instinto más que en las explicaciones.',noche:'La noche de luna es tu momento más poderoso de conexión intuitiva.'}
  },
  {id:19,nombre:'El Sol',emoji:'☀️',arcano:'Mayor',
   sig:'El Sol representa la plenitud consciente, la alegría auténtica y el éxito brillante. Es la carta de la claridad total, la vitalidad desbordante y el reconocimiento que viene de ser completamente uno mismo.',
   inv:'Invertido, el Sol señala alegría bloqueada, arrogancia que oculta la inseguridad o un período de baja energía y falta de perspectiva positiva.',
   signo:{aries:'El Sol amplifica tu energía vital; este es tu momento de máximo brillo y acción.',tauro:'El Sol ilumina tus talentos naturales; comparte tu abundancia con generosidad.',geminis:'El Sol ilumina tu mente brillante; comunica tu verdad con alegría y claridad.',cancer:'El Sol calienta tu corazón nutrido; la alegría y el amor fluyen libremente.',leo:'El Sol es tu carta esencia; este es tu momento de máxima expresión y reconocimiento.',virgo:'El Sol ilumina tu servicio; el reconocimiento por tu trabajo impecable llega ahora.',libra:'El Sol ilumina tus relaciones; la armonía y la belleza brillan en tu vida.',escorpio:'El Sol revela lo que estaba en sombra; la transformación produce ahora frutos luminosos.',sagitario:'El Sol amplifica tu visión y entusiasmo; el mundo está abierto para ti.',capricornio:'El Sol reconoce tu trabajo y disciplina; el éxito tangible llega ahora.',acuario:'El Sol ilumina tu visión de futuro; el mundo está listo para tus ideas innovadoras.',piscis:'El Sol clarifica tus sueños; la manifestación de lo que soñaste está al alcance.'},

   momento:{mañana:'El Sol matutino es tu aliado; comienza el día con gratitud y entusiasmo.',tarde:'La energía solar de la tarde es perfecta para acciones que requieren confianza y visibilidad.',noche:'Cierra el día con gratitud por la luz que recibiste; el Sol siempre vuelve.'}
  },
  {id:20,nombre:'El Juicio',emoji:'📯',arcano:'Mayor',
   sig:'El Juicio representa el despertar espiritual, el llamado a una nueva vida y la evaluación honesta del camino recorrido. Es la oportunidad de dejar el pasado atrás y responder al llamado del alma.',
   inv:'Invertido, el Juicio señala resistencia al despertar, incapacidad de perdonarse a uno mismo o la parálisis ante el llamado a un cambio de vida.',

   momento:{mañana:'El amanecer es tu llamado diario; comienza el día desde el alma, no desde el hábito.',tarde:'Cuando sientas el llamado del propósito, detente y escúchalo; es tu brújula.',noche:'La noche del Juicio invita a evaluar el día desde el alma; ¿actuaste desde lo más alto?'}

  {id:21,nombre:'El Mundo',emoji:'🌍',arcano:'Mayor',
   sig:'El Mundo representa la culminación exitosa de un ciclo, la integración total y la celebración del camino recorrido. Es la maestría ganada, el logro completo y la preparación para el próximo gran ciclo.',
   inv:'Invertido, el Mundo señala ciclos incompletos, dificultad para cerrar etapas o el éxito que se retrasa por resistencias internas.',
   signo:{aries:'El Mundo corona tu ciclo de conquistas; prepárate para el próximo horizonte.',tauro:'El Mundo celebra la abundancia que has cultivado con paciencia; lo lograste.',geminis:'El Mundo integra todas tus facetas en una síntesis brillante y completa.',cancer:'El Mundo reconoce el amor y el cuidado que has dado; ahora recibes la recompensa.',leo:'El Mundo te entrega el escenario mundial; tu tiempo de mayor reconocimiento ha llegado.',virgo:'El Mundo celebra tu trabajo impecable; la perfección que buscabas se ha manifestado.',libra:'El Mundo trae la armonía total que siempre has buscado; el equilibrio se alcanzó.',escorpio:'El Mundo es el resultado de tu profunda transformación; la maestría es tuya.',sagitario:'El Mundo amplía tu horizonte al máximo; el viaje que emprendiste te ha traído aquí.',capricornio:'El Mundo es la cima que escalarste con disciplina; el éxito es completo y merecido.',acuario:'El Mundo reconoce tu contribución a la humanidad; el cambio que soñaste ha llegado.',piscis:'El Mundo es la disolución del yo en el Todo; la trascendencia que buscabas es real.'},

const FIGURAS = ['Sota','Caballero','Reina','Rey'];
const NUMEROS = ['Dos','Tres','Cuatro','Cinco','Seis','Siete','Ocho','Nueve','Diez'];

  const sigTexts = {aries:'Tu energía aporta una dimensión especial a esta carta.',tauro:'La paciencia es tu mayor aliada en la energía de esta carta.',geminis:'Tu curiosidad te permite extraer múltiples lecturas de esta energía.',cancer:'Tu intuición enriquece la lectura de esta carta.',leo:'Tu brillo personal amplifica la energía de esta carta.',virgo:'Tu precisión encuentra en esta carta un reflejo de tu búsqueda.',libra:'Tu amor por el equilibrio resuena con la energía de esta carta.',escorpio:'Tu profundidad añade capas de significado a esta carta.',sagitario:'Tu visión expansiva encuentra en esta carta nuevas perspectivas.',capricornio:'Tu disciplina te ayuda a integrar la energía de esta carta.',acuario:'Tu innovación transforma la energía de esta carta.',piscis:'Tu sensibilidad capta matices de esta carta que otros pasan por alto.'};

    if(!ARCANOS.find(c=>c.nombre===`${nombres[i]} de ${palo}`)) {

// ============================================================
// SEED-BASED RNG
// ============================================================
function hashSeed(str) {
  let h = 0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(31,h)+str.charCodeAt(i)|0;
  }
  return Math.abs(h);
}

function seededRand(seed) {
  let s = seed;
  return function() {
    s = Math.imul(1664525, s) + 1013904223 | 0;
    return (s >>> 0) / 4294967296;
  };
}

function buildSeed(signo, tirada) {
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  const block4h = Math.floor(now.getHours() / 4);
  return hashSeed(`${signo}-${tirada}-${dayOfYear}-${block4h}`);
}

function selectCards(signo, tiradaKey) {
  const seed = buildSeed(signo, tiradaKey);
  const rand = seededRand(seed);
  const tirada = TIRADAS[tiradaKey];
  const n = tirada.posiciones.length;
  const pool = [...ARCANOS];
  const result = [];
  for(let i=0;i<n;i++){
    const idx = Math.floor(rand() * pool.length);
    const card = pool.splice(idx,1)[0];
    const inverted = rand() < 0.3;
    result.push({card, inverted});
  }
  return result;
}

// ============================================================
// UI STATE
// ============================================================
let currentState = {signo:'', tirada:'', cards:[], revealed:[]};

// ============================================================
// TIRADA DESCRIPTIONS
// ============================================================
document.getElementById('tirada-select').addEventListener('change', e => {
  const v = e.target.value;
  const desc = document.getElementById('tirada-desc');
  if(v && TIRADAS[v]) {
    const pos = TIRADAS[v].posiciones.map((p,i)=>`${i+1}. ${p.label}`).join(' · ');
    desc.textContent = `${TIRADAS[v].desc} Posiciones: ${pos}`;
  } else {
    desc.textContent = 'Selecciona una tirada para ver su descripción y las posiciones que revela.';
  }
});

// ============================================================
// MAIN FLOW
// ============================================================
function iniciarConsulta() {
  const signo = document.getElementById('signo-select').value;
  const tirada = document.getElementById('tirada-select').value;
  if(!signo){ alert('Por favor elige tu signo zodiacal.'); return; }
  if(!tirada){ alert('Por favor elige el tipo de tirada.'); return; }

  currentState.signo = signo;
  currentState.tirada = tirada;
  currentState.cards = selectCards(signo, tirada);
  currentState.revealed = new Array(currentState.cards.length).fill(false);

  // Show shuffle
  const overlay = document.getElementById('shuffle-overlay');
  overlay.classList.add('active');
  setTimeout(() => {
    overlay.classList.remove('active');
    renderReading();
  }, 2200);
}

function renderReading() {
  const {signo, tirada, cards} = currentState;
  const tiradaData = TIRADAS[tirada];

  // Header
  const now = new Date();
  const opts = {weekday:'long',year:'numeric',month:'long',day:'numeric'};
  const fechaStr = now.toLocaleDateString('es-ES', opts);
  const hora = now.getHours();
  const bloque = hora < 12 ? 'Mañana' : hora < 18 ? 'Tarde' : 'Noche';

  document.getElementById('reading-title').textContent =
    `${tiradaData.nombre} · ${SIGNOS_LABEL[signo]}`;
  document.getElementById('reading-meta').textContent =
    `${fechaStr} · ${bloque} · Lectura del Momento`;

  // Cards stage
  const stage = document.getElementById('cards-stage');
  stage.innerHTML = '';
  const interpsContainer = document.getElementById('interps-container');
  interpsContainer.innerHTML = '';

  cards.forEach((item, i) => {
    const posData = tiradaData.posiciones[i];
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.innerHTML = `
      <div class="slot-label">${posData.label}</div>
      <div class="card-flip" onclick="revealCard(${i})">
        <div class="card-inner" id="card-inner-${i}">
          <div class="card-face card-back">
            <div class="tap-hint">toca para revelar</div>
          </div>
          <div class="card-face card-front${item.inverted?' inverted-card':''}">
            <div class="card-emoji">${item.card.emoji}</div>
            <div class="card-name">${item.card.nombre}</div>
            ${item.inverted?'<div class="card-inv-badge">✦ Invertida</div>':''}
          </div>
        </div>
      </div>
    `;
    stage.appendChild(slot);

    // Interpretation panel (hidden until revealed)
    const panel = document.createElement('div');
    panel.className = 'interp-panel';
    panel.id = `interp-${i}`;
    panel.innerHTML = buildInterpHTML(item, posData, signo, bloque.toLowerCase());
    interpsContainer.appendChild(panel);
  });

  // Show section
  document.getElementById('setup-panel').style.display = 'none';
  const readingSection = document.getElementById('reading-section');
  readingSection.style.display = 'block';
  readingSection.classList.add('active');
  readingSection.scrollIntoView({behavior:'smooth'});
}

function revealCard(i) {
  if(currentState.revealed[i]) return;
  currentState.revealed[i] = true;

  document.getElementById(`card-inner-${i}`).classList.add('flipped');

  setTimeout(() => {
    const panel = document.getElementById(`interp-${i}`);
    panel.style.display = 'block';
    requestAnimationFrame(() => {
      panel.classList.add('visible');
      panel.scrollIntoView({behavior:'smooth', block:'nearest'});
    });
  }, 500);

  // Check if all revealed
  if(currentState.revealed.every(Boolean)) {
    setTimeout(() => {
      document.getElementById('bottom-actions').classList.add('active');
    }, 800);
  }
}

function buildInterpHTML(item, posData, signo, momento) {
  const {card, inverted} = item;
  const posKey = posData.key;
  const badge = inverted
    ? '<span class="interp-badge badge-invertida">✦ Invertida</span>'
    : '<span class="interp-badge badge-derecha">✦ Derecha</span>';

  const sigText = card.signo[signo] || '';
  const posText = (card.pos[posKey] || card.sig);
  const mainText = inverted ? card.inv : card.sig;
  const momText = card.momento[momento] || card.momento['tarde'];

  return `
    <div class="interp-pos">Posición · ${posData.label}</div>
    <div class="interp-card-title">${card.emoji} ${card.nombre}${badge}</div>
    <div class="interp-body">
      <p>${posText}</p>
      ${inverted ? `<p><em>Energía invertida:</em> ${card.inv}</p>` : `<p>${mainText !== posText ? mainText : ''}</p>`}
      <p class="interp-signo">✦ Para ${SIGNOS_LABEL[signo]}: ${sigText}</p>
      <p class="interp-momento">☽ ${momText}</p>
    </div>
  `;
}

function resetApp() {
  document.getElementById('reading-section').style.display = 'none';
  document.getElementById('reading-section').classList.remove('active');
  document.getElementById('bottom-actions').classList.remove('active');
  document.getElementById('setup-panel').style.display = 'block';
  document.getElementById('signo-select').value = '';
  document.getElementById('tirada-select').value = '';
  document.getElementById('tirada-desc').textContent = 'Selecciona una tirada para ver su descripción y las posiciones que revela.';
  window.scrollTo({top:0,behavior:'smooth'});
}
